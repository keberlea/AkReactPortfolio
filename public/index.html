<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#9e7070" />

    <!-- ── SEO ─────────────────────────────────────────── -->
    <title>Alicia Keberle | Full Stack Developer</title>
    <meta name="description" content="Full stack developer with a background in microbiology and pharmaceutical science. Building responsive web applications with React, Node.js, and modern JavaScript. Based in Oregon." />
    <meta name="author" content="Alicia Keberle" />
    <meta name="keywords" content="Alicia Keberle, full stack developer, React developer, Node.js, JavaScript, Oregon, web developer, portfolio" />
    <link rel="canonical" href="https://aliciakeberle.com" />
    <!-- ↑ Update this URL once you have your domain -->

    <!-- ── Favicons ──────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="alternate icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Open Graph (LinkedIn / Facebook previews) ─────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aliciakeberle.com" />
    <meta property="og:title" content="Alicia Keberle | Full Stack Developer" />
    <meta property="og:description" content="Full stack developer with a background in microbiology and pharmaceutical science. Building with React, Node.js, and modern JavaScript." />
    <meta property="og:image" content="https://aliciakeberle.com/og-image.png" />
    <!-- ↑ Save a 1200×630px screenshot of your portfolio as public/og-image.png -->

    <!-- ── Twitter / X Card ──────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Alicia Keberle | Full Stack Developer" />
    <meta name="twitter:description" content="Full stack developer with a background in microbiology and pharmaceutical science." />
    <meta name="twitter:image" content="https://aliciakeberle.com/og-image.png" />

    <!-- ── Structured Data (Google rich results) ─────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Alicia Keberle",
      "url": "https://aliciakeberle.com",
      "jobTitle": "Full Stack Developer",
      "description": "Full stack developer with a background in microbiology and pharmaceutical science.",
      "sameAs": [
        "https://github.com/keberlea",
        "https://www.linkedin.com/in/keberlea/"
      ],
      "knowsAbout": [
        "JavaScript", "React", "Node.js", "Express.js",
        "MySQL", "MongoDB", "HTML", "CSS", "GraphQL"
      ]
    }
    </script>

    <!-- ── Fonts ──────────────────────────────────────────── -->
    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Cormorant Garamond (headings) + Jost (body) in one request -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
